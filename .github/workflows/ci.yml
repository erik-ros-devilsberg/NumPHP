name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NO_INTERACTION: true

jobs:
  build-test:
    name: PHP ${{ matrix.php }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpize

      - name: Install BLAS / LAPACK
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev liblapack-dev

      - run: phpize
      - run: ./configure --enable-numphp
      - run: make CFLAGS="-Wall -Wextra -Werror -Wshadow -Wstrict-prototypes -Wmissing-prototypes -O2 -g"
      - run: make test TESTS="--show-diff"

  examples:
    name: Examples (run + diff against checked-in expected output)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: phpize

      - name: Install BLAS / LAPACK
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev liblapack-dev

      - run: phpize
      - run: ./configure --enable-numphp
      - run: make CFLAGS="-Wall -Wextra -Werror -Wshadow -Wstrict-prototypes -Wmissing-prototypes -O2 -g"

      - name: Run examples and diff against .expected
        run: |
          set -e
          for f in examples/*.php; do
            echo "=== $f ==="
            diff <(php -d extension=./modules/numphp.so "$f") "${f%.php}.expected"
          done

  valgrind:
    name: Valgrind (PHP 8.3 / Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: phpize

      - name: Install BLAS / LAPACK + valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev liblapack-dev valgrind

      - run: phpize
      - run: ./configure --enable-numphp
      - run: make CFLAGS="-Wall -Wextra -Werror -Wshadow -Wstrict-prototypes -Wmissing-prototypes -O0 -g"
      - name: Run phpt under valgrind
        env:
          USE_ZEND_ALLOC: '0'
          TEST_PHP_ARGS: '-m'
        run: make test

  sanitizers:
    name: ASan + UBSan (gcc / PHP 8.3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: phpize

      - name: Install BLAS / LAPACK
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev liblapack-dev

      - run: phpize
      - run: ./configure --enable-numphp
      - run: make CFLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -O1 -g -Wall -Wextra -Werror -Wshadow -Wstrict-prototypes -Wmissing-prototypes" LDFLAGS="-fsanitize=address,undefined"

      - name: Run phpt under ASan + UBSan
        # PHP-internal startup leaks (getaddrinfo, dlopen _init, module
        # table) are suppressed via lsan.supp. Any leak originating in a
        # numphp_*/zim_NDArray_*/zim_Linalg_*/zim_BufferView_* frame fails
        # the job — those are real bugs, not noise.
        env:
          USE_ZEND_ALLOC: '0'
          ASAN_OPTIONS: 'detect_leaks=1:abort_on_error=1:halt_on_error=1'
          LSAN_OPTIONS: 'suppressions=lsan.supp'
          UBSAN_OPTIONS: 'print_stacktrace=1:halt_on_error=1'
        run: |
          export LD_PRELOAD="$(gcc -print-file-name=libasan.so):$(gcc -print-file-name=libubsan.so)"
          make test

  debug-php:
    name: Debug PHP + ZEND_RC_DEBUG
    runs-on: ubuntu-latest
    env:
      PHP_VERSION: '8.3.13'
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopenblas-dev liblapack-dev \
            libxml2-dev libsqlite3-dev \
            pkg-config bison re2c

      - name: Cache debug PHP build
        id: cache-debug-php
        uses: actions/cache@v4
        with:
          path: /opt/php-debug
          key: php-debug-${{ env.PHP_VERSION }}-v1

      - name: Build debug PHP from source
        if: steps.cache-debug-php.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          wget -q "https://www.php.net/distributions/php-${PHP_VERSION}.tar.xz"
          tar xf "php-${PHP_VERSION}.tar.xz"
          cd "php-${PHP_VERSION}"
          # --enable-debug enables ZEND_DEBUG which gates ZEND_RC_DEBUG +
          # ZEND_ALLOC_DEBUG + the engine assertion suite. Minimal extension
          # set: json (built-in PHP 8), hash, ctype, dom, sqlite3, libxml are
          # default-enabled and cover everything our phpt tests use. FFI is
          # not enabled — tests skip-if-not-loaded, matching the release lane.
          ./configure --prefix=/opt/php-debug \
            --enable-debug \
            --without-pear \
            --disable-cgi --disable-fpm --disable-phpdbg
          make -j"$(nproc)"
          sudo make install

      - name: Put debug PHP on PATH
        run: |
          echo "/opt/php-debug/bin" >> "$GITHUB_PATH"

      - name: Verify debug PHP
        run: |
          which php
          php -v
          # Expect "(... DEBUG ...)" in the version banner — fail fast if not.
          php -v | grep -q DEBUG

      - name: Build numphp against debug PHP
        # -O0 because debug PHP runs slow anyway and -O0 keeps line numbers
        # in any abort traces useful. Otherwise the canonical flag set.
        run: |
          phpize
          ./configure --enable-numphp
          make CFLAGS="-Wall -Wextra -Werror -Wshadow -Wstrict-prototypes -Wmissing-prototypes -O0 -g"

      - name: Run phpt under debug PHP
        env:
          ZEND_RC_DEBUG: '1'
          ZEND_ALLOC_DEBUG: '1'
          USE_ZEND_ALLOC: '0'
        run: make test TESTS="--show-diff"

      - name: Run examples and diff against .expected
        env:
          ZEND_RC_DEBUG: '1'
          ZEND_ALLOC_DEBUG: '1'
          USE_ZEND_ALLOC: '0'
        run: |
          set -e
          for f in examples/*.php; do
            echo "=== $f ==="
            diff <(php -d extension=./modules/numphp.so "$f") "${f%.php}.expected"
          done

  coverage:
    name: gcov (non-blocking — informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: phpize

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev liblapack-dev gcovr

      - run: phpize
      # Coverage build: warning flags applied for parity, but -Werror is
      # omitted because --coverage instrumentation can introduce diagnostics
      # that don't reflect source defects. Job is informational anyway. See
      # decision 36.
      - run: ./configure --enable-numphp CFLAGS="--coverage -Wall -Wextra -Wshadow -Wstrict-prototypes -Wmissing-prototypes -O0 -g" LDFLAGS="--coverage"
      - run: make
      - run: make test
      - run: |
          gcovr -r . \
            --filter 'numphp\.c$' \
            --filter 'ndarray\.c$' \
            --filter 'ops\.c$' \
            --filter 'linalg\.c$' \
            --filter 'io\.c$' \
            --filter 'bufferview\.c$' \
            --filter 'nditer\.c$' \
            --exclude '.*conftest.*' \
            --gcov-ignore-errors=no_working_dir_found \
            --print-summary

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: phpize
      - name: Install BLAS / LAPACK via Homebrew
        run: brew install openblas lapack
      - run: phpize
      - run: ./configure --enable-numphp
      - run: make CFLAGS="-Wall -Wextra -Werror -Wshadow -Wstrict-prototypes -Wmissing-prototypes -O2 -g"
      - run: make test
