name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: PHP ${{ matrix.php }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpize

      - name: Install BLAS / LAPACK
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev liblapack-dev

      - run: phpize
      - run: ./configure --enable-numphp
      - run: make CFLAGS="-Wall -Wextra -O2 -g"
      - run: make test TESTS="--show-diff"

  valgrind:
    name: Valgrind (PHP 8.3 / Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: phpize

      - name: Install BLAS / LAPACK + valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev liblapack-dev valgrind

      - run: phpize
      - run: ./configure --enable-numphp
      - run: make CFLAGS="-Wall -Wextra -O0 -g"
      - name: Run phpt under valgrind
        env:
          USE_ZEND_ALLOC: '0'
          TEST_PHP_ARGS: '-m'
        run: make test

  coverage:
    name: gcov (non-blocking until Story 2)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: phpize

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev liblapack-dev gcovr

      - run: phpize
      - run: ./configure --enable-numphp CFLAGS="--coverage -O0 -g" LDFLAGS="--coverage"
      - run: make
      - run: make test
      - run: gcovr -r . --filter ndarray.c --filter ops.c --print-summary

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: phpize
      - name: Install BLAS / LAPACK via Homebrew
        run: brew install openblas lapack
      - run: phpize
      - run: ./configure --enable-numphp
      - run: make
      - run: make test
